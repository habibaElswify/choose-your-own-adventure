<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Reader - Choose Your Own Adventure</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Reader-specific styles (base styles live in css/style.css once created) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #1a1a2e;
      color: #e0d6c8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Navbar ---- */
    nav {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    nav a {
      color: #c4b69c;
      text-decoration: none;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 0.95rem;
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }
    nav a:hover, nav a.active {
      background: #0f3460;
      color: #f5e6ca;
    }
    nav .brand {
      font-weight: bold;
      font-size: 1.1rem;
      color: #f5e6ca;
      margin-right: auto;
    }

    /* ---- Layout ---- */
    .reader-layout {
      display: flex;
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 2rem auto;
      gap: 1.5rem;
      padding: 0 1rem;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .sidebar-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 1rem;
    }
    .sidebar-card h3 {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a8ba6;
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 1.6rem;
      font-weight: bold;
      color: #f5e6ca;
    }
    .btn-restart {
      display: block;
      width: 100%;
      padding: 0.6rem;
      background: #533483;
      color: #f5e6ca;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      transition: background 0.2s;
    }
    .btn-restart:hover {
      background: #6a42a0;
    }

    /* ---- Book page ---- */
    .book-container {
      flex: 1;
      min-width: 0;
    }

    .breadcrumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      align-items: center;
      margin-bottom: 1rem;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 0.85rem;
      color: #7a8ba6;
    }
    .breadcrumbs .crumb {
      cursor: pointer;
      color: #a9927d;
      transition: color 0.2s;
    }
    .breadcrumbs .crumb:hover {
      color: #f5e6ca;
      text-decoration: underline;
    }
    .breadcrumbs .crumb.current {
      color: #f5e6ca;
      cursor: default;
    }
    .breadcrumbs .crumb.current:hover {
      text-decoration: none;
    }
    .breadcrumbs .separator {
      color: #4a5568;
      user-select: none;
    }

    .book-page {
      background: #f5e6ca;
      color: #2d2013;
      border-radius: 4px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.4),
                  inset 0 0 60px rgba(139, 119, 90, 0.15);
      position: relative;
      min-height: 400px;
      transition: opacity 0.35s ease;
    }
    .book-page::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, #c4a97d, #a9927d, #c4a97d);
      border-radius: 4px 0 0 4px;
    }
    .book-page.fade-out { opacity: 0; }
    .book-page.fade-in  { opacity: 1; }

    .page-number {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8b7760;
      margin-bottom: 1rem;
    }

    .page-text {
      font-size: 1.1rem;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    /* ---- Choices ---- */
    .choices-area {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .choice-btn {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.85rem 1.25rem;
      background: #2d2013;
      color: #f5e6ca;
      border: 2px solid #5c4428;
      border-radius: 6px;
      font-family: Georgia, serif;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .choice-btn:hover {
      background: #3e2d1a;
      border-color: #8b6b3d;
      transform: translateX(4px);
    }

    /* ---- The End overlay ---- */
    .end-overlay {
      display: none;
      margin-top: 2rem;
      padding: 1.5rem;
      background: #2d2013;
      border: 2px solid #8b6b3d;
      border-radius: 8px;
      text-align: center;
    }
    .end-overlay.visible { display: block; }
    .end-overlay h2 {
      font-size: 1.8rem;
      color: #f5e6ca;
      margin-bottom: 0.5rem;
    }
    .end-overlay .journey-stat {
      font-size: 0.95rem;
      color: #c4a97d;
      margin-bottom: 1.25rem;
    }
    .end-buttons {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .end-btn {
      padding: 0.65rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      transition: background 0.2s;
    }
    .end-btn.primary {
      background: #533483;
      color: #f5e6ca;
    }
    .end-btn.primary:hover { background: #6a42a0; }
    .end-btn.secondary {
      background: #5c4428;
      color: #f5e6ca;
    }
    .end-btn.secondary:hover { background: #7a5a38; }

    /* ---- Responsive ---- */
    @media (max-width: 720px) {
      .reader-layout {
        flex-direction: column-reverse;
      }
      .sidebar {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
      }
      .sidebar-card { flex: 1; min-width: 140px; }
      .book-page { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <span class="brand">Choose Your Own Adventure</span>
    <a href="index.html">Home</a>
    <a href="reader.html" class="active">Reader</a>
    <a href="explorer.html">Explorer</a>
    <a href="author.html">Author</a>
  </nav>

  <!-- Main layout -->
  <div class="reader-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>Path Length</h3>
        <div class="stat-value" id="stat-path-length">1</div>
      </div>
      <div class="sidebar-card">
        <h3>Pages Visited</h3>
        <div class="stat-value" id="stat-pages-visited">1</div>
      </div>
      <div class="sidebar-card">
        <button class="btn-restart" id="btn-sidebar-restart">Restart Story</button>
      </div>
    </aside>

    <!-- Book area -->
    <main class="book-container">

      <!-- Breadcrumbs -->
      <div class="breadcrumbs" id="breadcrumbs"></div>

      <!-- Page display -->
      <div class="book-page" id="book-page">
        <div class="page-number" id="page-number"></div>
        <div class="page-text" id="page-text"></div>

        <!-- Choices -->
        <div class="choices-area" id="choices-area"></div>

        <!-- The End -->
        <div class="end-overlay" id="end-overlay">
          <h2>The End</h2>
          <p class="journey-stat" id="journey-stat"></p>
          <div class="end-buttons">
            <button class="end-btn primary" id="btn-end-restart">Restart Story</button>
            <button class="end-btn secondary" id="btn-end-goback">Go Back</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="js/reader.js"></script>
</body>
</html>
